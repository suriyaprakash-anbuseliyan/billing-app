name: Build App (Installer EXE)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual trigger from the Actions tab

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Java (required for Flutter)
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Download VC++ Runtime (bundled into installer)
        run: |
          Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vc_redist.x64.exe" -OutFile "installer\vc_redist.x64.exe"

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Compile Installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\setup.iss

      - name: Upload Installer
        uses: actions/upload-artifact@v3
        with:
          name: BillingSetup_Installer
          path: installer\output\BillingSetup.exe

      - name: Zip Portable Build (no-install option)
        run: Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath BillingSoftware_Windows_Portable.zip

      - name: Upload Portable Build
        uses: actions/upload-artifact@v3
        with:
          name: BillingSoftware_Windows_Portable
          path: BillingSoftware_Windows_Portable.zip
